<style>
:root{
  --b950:#071A35; --b900:#0C2D58; --b800:#103F7A; --b700:#185FA5; --b600:#2077C8;
  --b500:#3B91E0; --b300:#6AAEE8; --b200:#B5D4F4; --b100:#DAEEFF; --b50:#EEF7FF;
  --g900:#1A1F2E; --g800:#2D3348; --g700:#3D4566; --g600:#4A5272; --g500:#6B7488;
  --g400:#8892B0; --g300:#B0B8CC; --g200:#C8D0E0; --g100:#E8ECF4; --g50:#F4F6FB;
  --w:#FFFFFF;
  --ok:#1A5C3A; --ok-bg:#D4EDDE;
  --warn:#8B5A00; --warn-bg:#FFF4D6;
  --alert:#8B1A1A; --alert-bg:#FDDEDE;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{visibility:hidden}
html.ready{visibility:visible}

body{
  font-family:'Sora',sans-serif;
  background:var(--g50);
  color:var(--g800);
  min-height:100vh;
  font-size:14px;
  position:relative;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

.bg-decor{
  position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at top left, rgba(59,145,224,.05) 0%, transparent 55%),
    radial-gradient(ellipse at bottom right, rgba(24,95,165,.04) 0%, transparent 50%);
}

.top{
  position:relative; z-index:2;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px;
  background:var(--w);
  border-bottom:1px solid var(--g100);
}
.top-brand{display:flex; align-items:center; gap:14px}
.top-logo{
  height:42px; width:auto; display:block;
}
.top-right{display:flex; align-items:center; gap:8px}
.btn-logout{
  background:var(--w);
  color:var(--g600);
  border:1px solid var(--g200);
  padding:8px 14px;
  border-radius:8px;
  font-family:'Sora',sans-serif;
  font-size:11.5px; font-weight:600;
  cursor:pointer;
  transition:all .15s;
  display:inline-flex; align-items:center; gap:6px;
}
.btn-logout:hover{
  background:var(--g50); border-color:var(--g300); color:var(--g800);
}

.wrap{
  position:relative; z-index:1;
  max-width:1180px; margin:0 auto;
  padding:32px 28px 48px;
}

.hero{
  background:var(--w);
  border:1px solid var(--g100);
  border-radius:20px;
  padding:48px 36px 44px;
  margin-bottom:20px;
  position:relative; overflow:hidden;
  box-shadow:0 1px 3px rgba(12,45,88,.04), 0 12px 36px -12px rgba(12,45,88,.10);
  text-align:center;
}
.hero::before{
  content:''; position:absolute; top:0; left:0; right:0; height:140px;
  background:radial-gradient(ellipse at top, var(--b50) 0%, transparent 70%);
  pointer-events:none; opacity:.6;
}
.hero > *{position:relative; z-index:1}

.hero-inst{
  font-family:'Cormorant Garamond', 'Sora', serif;
  font-weight:600;
  font-size:clamp(28px, 4.4vw, 44px);
  letter-spacing:.5px;
  color:var(--b900);
  line-height:1.05;
  margin-bottom:8px;
}
.hero-sub{
  font-size:clamp(13px, 1.6vw, 16px);
  color:var(--g500);
  font-weight:400;
  margin-bottom:22px;
  letter-spacing:.2px;
}
.hero-ornament{
  display:flex; align-items:center; justify-content:center; gap:10px;
  margin-bottom:24px;
}
.hero-ornament-line{
  width:60px; height:1px; background:var(--b500);
}
.hero-ornament-dot{
  width:6px; height:6px; border-radius:50%; background:var(--b600);
}

.hero-greet{
  font-size:13px; font-weight:600; letter-spacing:3.5px;
  color:var(--b700); margin-bottom:8px;
  text-transform:uppercase;
}

.hero-name{
  font-size:clamp(48px, 9vw, 88px);
  font-weight:500;
  letter-spacing:-2px;
  line-height:1;
  color:var(--b900);
  margin-bottom:10px;
}

.hero-role{
  font-size:clamp(16px, 2.2vw, 22px);
  color:var(--b700);
  font-weight:500;
  letter-spacing:.2px;
  margin-bottom:20px;
}

.hero-date{
  display:inline-flex; align-items:center; gap:8px;
  background:var(--g50);
  border:1px solid var(--g100);
  padding:8px 18px;
  border-radius:50px;
  font-size:12px;
  font-family:'DM Mono', monospace;
  color:var(--g600);
  margin-bottom:30px;
}

.cta{
  background:linear-gradient(135deg, var(--b800), var(--b600));
  color:var(--w);
  border:none;
  padding:16px 48px;
  border-radius:12px;
  font-family:'Sora', sans-serif;
  font-size:15px; font-weight:600;
  letter-spacing:.3px;
  cursor:pointer;
  display:inline-flex; align-items:center; gap:14px;
  box-shadow:0 8px 22px -6px rgba(24,95,165,.45);
  transition:all .2s;
}
.cta:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 32px -8px rgba(24,95,165,.6);
}
.cta:active{transform:translateY(0)}
.cta-arrow{font-size:18px; transition:transform .2s}
.cta:hover .cta-arrow{transform:translateX(4px)}

.bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
@media(max-width:680px){.bottom{grid-template-columns:1fr}}

.box{
  background:var(--w);
  border:1px solid var(--g100);
  border-radius:12px;
  padding:14px 16px 12px;
  box-shadow:0 1px 2px rgba(12,45,88,.03);
}
.box-hdr{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px; padding-bottom:8px;
  border-bottom:1px solid var(--g100);
}
.box-title{
  font-size:11px; font-weight:700; letter-spacing:.8px;
  color:var(--g700); display:flex; align-items:center; gap:8px;
  text-transform:uppercase;
}
.box-title .ico{font-size:13px; color:var(--b600)}
.box-count{
  font-size:10px; font-weight:700; letter-spacing:.3px;
  color:var(--b700); background:var(--b50);
  padding:2px 8px; border-radius:50px;
  border:1px solid var(--b100);
}

.box-list{
  display:flex; flex-direction:column; gap:5px;
  max-height:180px; overflow-y:auto; padding-right:2px;
}
.box-list::-webkit-scrollbar{width:5px}
.box-list::-webkit-scrollbar-thumb{background:var(--g200); border-radius:3px}
.box-list::-webkit-scrollbar-track{background:transparent}

.box-item{
  font-size:12px; color:var(--g800);
  padding:6px 8px;
  background:var(--g50);
  border-radius:6px;
  display:flex; align-items:center; gap:8px;
}
.box-item-main{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.box-item-tag{
  font-size:10px; font-weight:700; padding:2px 7px;
  border-radius:5px; flex-shrink:0;
  background:var(--b50); color:var(--b700);
  border:1px solid var(--b100);
}
.box-item-tag.t-hoy{background:var(--ok-bg); color:var(--ok); border-color:#A5D6B5}
.box-item-tag.t-venc{background:var(--alert-bg); color:var(--alert); border-color:#F5B5B5}
.box-item-tag.t-pron{background:var(--warn-bg); color:var(--warn); border-color:#FCE3A2}

.box-empty{
  text-align:center; padding:18px 8px; color:var(--g400); font-size:11px;
}
.box-empty-ico{font-size:20px; opacity:.4; margin-bottom:4px}

.loader-wrap{
  position:fixed; inset:0; background:var(--g50);
  display:flex; align-items:center; justify-content:center;
  z-index:9999; transition:opacity .4s;
}
.loader-wrap.hide{opacity:0; pointer-events:none}
.loader{
  width:40px; height:40px; border-radius:50%;
  border:3px solid var(--g200);
  border-top-color:var(--b600);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:560px){
  .top{padding:12px 16px}
  .top-logo{height:34px}
  .wrap{padding:22px 14px 40px}
  .hero{padding:32px 22px 28px; border-radius:16px}
  .hero-inst{font-size:24px}
  .hero-name{font-size:46px}
  .hero-greet{font-size:11px; letter-spacing:2px}
  .cta{padding:14px 32px; font-size:14px}
}
</style>
</head>

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

function fechaLarga(d){
  return DIAS[d.getDay()].charAt(0).toUpperCase()+DIAS[d.getDay()].slice(1)+', '+d.getDate()+' de '+MESES[d.getMonth()]+' de '+d.getFullYear();
}
function fechaCorta(s){
  if (!s) return '—';
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return s;
  const d = new Date(+m[1], +m[2]-1, +m[3]);
  return d.getDate()+' '+MESES[d.getMonth()].slice(0,3);
}
function hoyISO(){
  const d = new Date(); const m = String(d.getMonth()+1).padStart(2,'0'); const dd = String(d.getDate()).padStart(2,'0');
  return d.getFullYear()+'-'+m+'-'+dd;
}
function diasEntre(isoA, isoB){
  if (!isoA || !isoB) return null;
  const a = new Date(isoA.substring(0,10));
  const b = new Date(isoB.substring(0,10));
  return Math.round((b - a) / 86400000);
}
function saludoSegunHora(genero){
  const h = new Date().getHours();
  const sufijo = (genero === 'F') ? 'Bienvenida' : (genero === 'M') ? 'Bienvenido' : 'Bienvenido(a)';
  let franja;
  if (h < 12) franja = 'Buenos días';
  else if (h < 19) franja = 'Buenas tardes';
  else franja = 'Buenas noches';
  return franja + ' · ' + sufijo;
}
function primerNombre(nombreCompleto, mailFallback){
  if (nombreCompleto){
    const limpio = nombreCompleto.replace(/^(Lic\.?|C\.P\.?|Ing\.?|Mtro\.?|Mtra\.?|Dr\.?|Dra\.?|Pasante)\s+/i,'').trim();
    const partes = limpio.split(/\s+/);
    if (partes.length) return partes[0];
  }
  if (mailFallback){
    const local = mailFallback.split('@')[0] || mailFallback;
    const tk = local.split(/[._-]/)[0];
    if (tk) return tk.charAt(0).toUpperCase()+tk.slice(1).toLowerCase();
  }
  return 'Usuario';
}

function goLogin(){ window.location.replace('login.html'); }

async function bootstrap(){
  if (!window.supabase){ setTimeout(bootstrap, 80); return; }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let session = null;
  try{
    const res = await sb.auth.getSession();
    session = res && res.data && res.data.session;
  } catch(e){ console.warn('Bienvenida · auth fallo:', e); }

  if (!session){ goLogin(); return; }
  userMail = (session.user && session.user.email || '').toLowerCase();

  resolverPerfil(session.user);
  pintarHero();
  await cargarEstado();
  pintarBoxes();

  document.documentElement.classList.add('ready');
  $loader.classList.add('hide');
  setTimeout(function(){ $loader.style.display='none'; }, 500);
}

function resolverPerfil(authUser){
  const match = USUARIOS.find(u => u.mail.toLowerCase() === userMail);
  if (match){
    perfil = { nombre: match.nombre, puesto: match.puesto, genero: match.genero };
  } else {
    const meta = (authUser && authUser.user_metadata) || {};
    const nombre = meta.full_name || meta.name || primerNombre(null, userMail);
    perfil = { nombre: nombre, puesto: 'Usuario del sistema', genero: '' };
  }
}

function pintarHero(){

async function cargarEstado(){
  try{
    const r = await sb.from('siga_estado').select('data').eq('id', STATE_ROW_ID).maybeSingle();
    if (!r.error && r.data && r.data.data){
      state = r.data.data;
      try{ localStorage.setItem(SIGA_KEY, JSON.stringify(state)); }catch(_){}
      return;
    }
  } catch(e){ console.warn('Bienvenida · downloadState fallo:', e); }
  try{
    const raw = localStorage.getItem(SIGA_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e){ console.warn('Bienvenida · localStorage parse fallo:', e); }
}

function safeArr(x){ return Array.isArray(x) ? x : []; }

function recolectarAgenda(){
  if (!state) return [];
  const eventos = safeArr(state.agendaEventos);
  const out = [];
  eventos.forEach(function(e){
    if (!e) return;
    const f = e.fecha || e.fechaInicio || e.fech || '';
    if (!f) return;
    out.push({
      fecha: f, hora: e.hora || '', tipo: e.tipo || 'otro',
      titulo: e.titulo || e.descripcion || e.asunto || 'Evento',
      sub: e.cliente || e.prospecto || e.expediente || ''
    });
  });
  const prospectos = safeArr(state.prospectos);
  prospectos.forEach(function(p){
    if (!p) return;
    if (p.etapa === 2 && p.citaFecha){
      out.push({
        fecha: p.citaFecha, hora: p.citaHora || '', tipo:'cita',
        titulo:'Cita con ' + (p.nombre || 'prospecto'),
        sub: p.canal ? ('Canal: ' + p.canal) : ''
      });
    }
  });
  return out;
}

function recolectarPendientes(){
  if (!state) return [];
  const items = [];

  const sols = safeArr(state.solicitudesPrecio || state.solicitudes);
  const solsPend = sols.filter(s => s && s.estado === 'pendiente');
  if (solsPend.length){
    const urg = solsPend.filter(s => s.prioridad === 'urgente').length;
    items.push({
      titulo: solsPend.length + ' solicitud' + (solsPend.length>1?'es':'') + ' pendiente' + (solsPend.length>1?'s':''),
      sub: 'URRJ',
      flag: urg ? 'urg' : 'info'
    });
  }

  const tickets = safeArr(state.uacTickets);
  const tickAb = tickets.filter(t => t && t.estado !== 'resuelto' && t.estado !== 'cerrado');
  if (tickAb.length){
    items.push({
      titulo: tickAb.length + ' ticket' + (tickAb.length>1?'s':'') + ' abierto' + (tickAb.length>1?'s':''),
      sub: 'UAC',
      flag: 'info'
    });
  }

  const exps = state.expedientes && typeof state.expedientes === 'object' ? state.expedientes : {};
  let venc = 0, pend = 0;
  const hoy = hoyISO();
  Object.keys(exps).forEach(function(pid){
    const e = exps[pid] || {}; const c = e.campos || {};
    if (c['apt-monto'] && !c['apt-pagado-en'] && c['apt-vence']){ pend++; if (c['apt-vence'] < hoy) venc++; }
    if (c['cnt-pago-35-monto'] && !c['cnt-pago-35-pagado-en'] && c['cnt-pago-35-vence']){ pend++; if (c['cnt-pago-35-vence'] < hoy) venc++; }
    if (c['cnt-pago-60-monto'] && !c['cnt-pago-60-pagado-en'] && c['cnt-pago-60-vence']){ pend++; if (c['cnt-pago-60-vence'] < hoy) venc++; }
  });
  if (pend){
    items.push({
      titulo: pend + ' pago' + (pend>1?'s':'') + ' por cobrar',
      sub: venc ? (venc + ' vencido' + (venc>1?'s':'')) : 'Cartera',
      flag: venc ? 'urg' : 'info'
    });
  }

  const jur = safeArr(state.juridicoCasos);
  const jurAct = jur.filter(j => j && j.estado !== 'cerrado' && j.estado !== 'archivado');
  if (jurAct.length){
    items.push({
      titulo: jurAct.length + ' caso' + (jurAct.length>1?'s':'') + ' jurídico' + (jurAct.length>1?'s':'') + ' activo' + (jurAct.length>1?'s':''),
      sub: 'Demandas',
      flag: 'info'
    });
  }

  const prospectos = safeArr(state.prospectos);
  let frios = 0;
  prospectos.forEach(function(p){
    if (!p || p.etapa >= 5) return;
    const ult = p.ultimoContacto || p.fechaIngreso;
    if (!ult) return;
    const d = diasEntre(ult.substring(0,10), hoy);
    if (d !== null && d > 14) frios++;
  });
  if (frios){
    items.push({
      titulo: frios + ' prospecto' + (frios>1?'s':'') + ' sin contacto',
      sub: 'Más de 14 días',
      flag: 'warn'
    });
  }

  return items;
}

function pintarBoxes(){
  const agenda = recolectarAgenda();
  const pendientes = recolectarPendientes();
  const hoy = hoyISO();

  const agendaFutura = agenda
    .filter(e => (e.fecha || '').substring(0,10) >= hoy)
    .sort(function(a,b){
      const fa = (a.fecha||'').substring(0,10) + ' ' + (a.hora||'');
      const fb = (b.fecha||'').substring(0,10) + ' ' + (b.hora||'');
      return fa.localeCompare(fb);
    });

  $cAge.textContent = agendaFutura.length;
  if (!agendaFutura.length){
    $listAge.innerHTML =
      '<div class="box-empty">'+
        '<div class="box-empty-ico">📅</div>'+
        'Sin eventos programados'+
      '</div>';
  } else {
    const top = agendaFutura.slice(0, 6);
    $listAge.innerHTML = top.map(function(e){
      const f = (e.fecha||'').substring(0,10);
      const esHoy = (f === hoy);
      const d = diasEntre(hoy, f);
      let tagClass = '';
      let tagTxt = '';
      if (esHoy){
        tagClass = 't-hoy';
        tagTxt = e.hora || 'Hoy';
      } else if (d === 1){
        tagClass = 't-pron';
        tagTxt = 'Mañana';
      } else {
        tagTxt = fechaCorta(f);
      }
      return ''+
        '<div class="box-item">'+
          '<span class="box-item-main">'+esc(e.titulo)+(e.sub ? ' · '+esc(e.sub) : '')+'</span>'+
          '<span class="box-item-tag '+tagClass+'">'+esc(tagTxt)+'</span>'+
        '</div>';
    }).join('');
  }

  $cPen.textContent = pendientes.length;
  if (!pendientes.length){
    $listPen.innerHTML =
      '<div class="box-empty">'+
        '<div class="box-empty-ico">✓</div>'+
        'Todo al día'+
      '</div>';
  } else {
    $listPen.innerHTML = pendientes.map(function(p){
      let cls = '';
      let badge = 'Ver';
      if (p.flag === 'urg'){ cls = 't-venc'; badge = 'Urgente'; }
      else if (p.flag === 'warn'){ cls = 't-pron'; badge = 'Revisar'; }
      return ''+
        '<div class="box-item">'+
          '<span class="box-item-main">'+esc(p.titulo)+(p.sub ? ' · '+esc(p.sub) : '')+'</span>'+
          '<span class="box-item-tag '+cls+'">'+badge+'</span>'+
        '</div>';
    }).join('');
  }
}
